<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clon Samsung</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="top-bar">
        <p>Compra ahora con ENVÍO GRATIS</p>
    </div>

    <nav class="navbar">
        <h1 class="logo">SAMSUNG</h1>
        <ul class="menu">
            <li><a href="#">Mobile</a></li>
            <li><a href="#">TV & Audio</a></li>
            <li><a href="#">Electrodomésticos</a></li>
            <li><a href="#">Monitores</a></li>
            <li><a href="#">Tecnología AI</a></li>
            <li><a href="#">Promociones del mes</a></li>
            <li><a href="#">Ventas especiales</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="hero">
        <div class="hero-img">
            <img src="images/galaxy.png" alt="Samsung Galaxy S26">
        </div>

    </section>
    <section class="formulario">
    <h3>Contáctanos</h3>
    <form>
        <input type="text" placeholder="Nombre">
        <input type="email" placeholder="Correo">
        <input type="text" placeholder="Mensaje">
        <button type="submit">Enviar</button>
    </form>
</section>
</main>

<footer>
    <p>Clon educativo</p>
</footer>

</body>
</html>
