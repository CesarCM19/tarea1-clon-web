<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clon Samsung</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="top-bar">
        <p>Compra ahora con ENVÍO GRATIS</p>
    </div>

    <nav class="navbar">
        <h1 class="logo">SAMSUNG</h1>
        <ul class="menu">
            <li><a href="#">Mobile</a></li>
            <li><a href="#">TV & Audio</a></li>
            <li><a href="#">Electrodomésticos</a></li>
            <li><a href="#">Monitores</a></li>
            <li><a href="#">Tecnología AI</a></li>
            <li><a href="#">Promociones del mes</a></li>
            <li><a href="#">Ventas especiales</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="hero">
        <div class="hero-img">
            <img src="images/galaxy.png" alt="Samsung Galaxy S26">
        </div>
    </section>
    <section class="beneficios">

    <div class="beneficio">
        <img src="images/tarjeta.png" alt="Pago en cuotas">
        <p>Hasta 24 cuotas tasa 0</p>
    </div>

    <div class="beneficio">
        <img src="images/envio.png" alt="Envío gratis">
        <p>Envío Gratis Nacional</p>
    </div>

    <div class="beneficio">
        <img src="images/ofertas.png" alt="Ofertas exclusivas">
        <p>Ofertas Exclusivas</p>
    </div>

    <div class="beneficio">
        <img src="images/canje.png" alt="Plan canje">
        <p>Plan Canje Samsung</p>
    </div>

</section>
    <section class="formulario">
    <h3>Contáctanos</h3>
    <form>
        <input type="text" placeholder="Nombre">
        <input type="email" placeholder="Correo">
        <input type="text" placeholder="Mensaje">
        <button type="submit">Enviar</button>
    </form>
</section>
</main>

<footer>
    <p><center>Clon educativo</center></p>
</footer>

</body>
</html>
